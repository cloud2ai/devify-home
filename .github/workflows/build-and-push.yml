name: Build and Deploy

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ${{ vars.REGISTRY }}
  IMAGE_NAME: ${{ vars.IMAGE_NAME }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=semver,pattern=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: ${{ secrets.SSH_KNOWN_HOSTS }}
          if_key_exists: fail

      - name: Deploy to aimychats.com production
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.DEVIFY_DEPLOY_SSH_HOST }}
          username: ${{ vars.DEVIFY_DEPLOY_SSH_USER }}
          port: ${{ vars.DEVIFY_DEPLOY_SSH_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            # Refresh the homepage through the compose stack so devify-home
            # stays managed by devify-deploy. A standalone `docker run` here
            # creates an unmanaged container that collides with the compose
            # stack on the "devify-home" name and breaks the next full app
            # deploy (cloud2ai/devify-deploy#2).
            cd ~/devify-deploy
            git pull --ff-only origin main || true
            ./scripts/devify-deploy.sh update-home
            docker image prune -f
